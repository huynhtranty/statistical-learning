# Cấu hình huấn luyện YOLO

model:
  model_name: yolo_custom
  num_classes: 10           # Số lớp vật thể: cat, dog, horse, cow, bird, sheep, elephant, bear, zebra, giraffe
  image_size: 320           # Kích thước ảnh input (320, 416, 512, 640, 768, 1024)
  base_channels: 32         # Số kênh cơ sở (tăng để có model lớn hơn)
  num_anchors: 3            # Số anchor mỗi vị trí grid
  classes: ["cat", "dog", "horse", "cow", "bird", "sheep", "elephant", "bear", "zebra", "giraffe"]

training:
  epochs: 50
  batch_size: 8
  num_workers: 4
  lr: 0.001                 # Learning rate
  weight_decay: 0.0001      # Weight decay cho optimizer

inference:
  conf_threshold: 0.25      # Confidence threshold (0.0 - 1.0)
  iou_threshold: 0.45       # IoU threshold cho NMS (0.0 - 1.0)

# TODO: Định nghĩa anchor sizes cụ thể cho từng scale.
