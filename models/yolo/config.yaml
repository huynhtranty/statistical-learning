# Cấu hình kiến trúc YOLO
# Chỉ chứa thông số model cơ bản. Cấu hình dataset/split sẽ thêm sau.

model:
  model_name: yolo_custom
  num_classes: 6              # Số lớp vật thể: cat, dog, horse, cow, bird, sheep
  image_size: 640
  base_channels: 32         # Số kênh cơ sở (tăng để có model lớn hơn)
  num_anchors: 3            # Số anchor mỗi vị trí grid
  classes: ["cat", "dog", "horse", "cow", "bird", "sheep"]

