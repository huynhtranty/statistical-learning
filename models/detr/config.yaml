# DETR (HuggingFace) training config
# All three models share: input_size=640, seed=42, COCO JSON annotations.

model:
  pretrained_id: facebook/detr-resnet-50
  num_queries: 100        # max objects per image — DETR predicts a fixed number
  ignore_mismatched_sizes: true   # required when changing num_labels

data:
  input_size: 640
  classes_file: data/processed/annotations/classes.txt
  train_ann: data/processed/annotations/train.json
  val_ann: data/processed/annotations/val.json
  train_images: data/processed/images/train
  val_images: data/processed/images/val

train:
  epochs: 50
  batch_size: 4
  num_workers: 2
  seed: 42
  optimizer:
    name: AdamW
    lr: 0.0001            # lr for transformer
    backbone_lr: 0.00001  # smaller lr for the pretrained ResNet backbone
    weight_decay: 0.0001
  scheduler:
    name: StepLR
    step_size: 30
    gamma: 0.1
  gradient_clip_norm: 0.1

logging:
  project: runs/detr
  name: exp
