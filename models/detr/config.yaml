# Cấu hình kiến trúc DETR
# Chỉ chứa thông số model cơ bản. Cấu hình dataset/split sẽ thêm sau.

model:
  model_name: detr_resnet50
  num_classes: 10           # Số lớp vật thể: cat, dog, horse, cow, bird, sheep, elephant, bear, zebra, giraffe (không tính "no object")
  image_size: 640
  pretrained_backbone: true
  num_queries: 100          # Số vật thể tối đa có thể detect mỗi ảnh
  hidden_dim: 256           # Số chiều ẩn của transformer
  num_heads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  classes: ["cat", "dog", "horse", "cow", "bird", "sheep", "elephant", "bear", "zebra", "giraffe"]

inference:
  conf_threshold: 0.7        # Confidence threshold cho predictions (0.0 - 1.0)
  iou_threshold: 0.5        # IoU threshold cho NMS (0.0 - 1.0)

training:
  batch_size: 4
  num_workers: 4
  epochs: 50
  lr: 0.0001               # Learning rate (thường thấp hơn YOLO)
  weight_decay: 0.0001      # Weight decay cho optimizer

loss:
  cost_class: 1.0          # Trọng số loss classification
  cost_bbox: 5.0            # Trọng số L1 loss cho bbox
  cost_giou: 2.0           # Trọng số GIoU loss

# TODO: Thêm cấu hình optimizer (AdamW, learning rate riêng cho backbone và transformer).
